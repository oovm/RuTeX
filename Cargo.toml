[workspace]
resolver = "2"
members = ["projects/*"]
default-members = [
    "projects/rutex",
    "projects/rutex-types",
    "projects/rutex-parser",
    "projects/knuth-plass",
    "projects/rutex-fonts",
    "projects/rutex-layout",
    "projects/rutex-renderer",
    "projects/rutex-wasm32-wasi",
    "projects/rutex-wit",
]
exclude = [
    "projects/.DS_Store",
]

[profile.release]
lto = true
